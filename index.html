<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBTI性格测试 - 发现你的动物灵魂</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #fef5e7 0%, #fdebd0 50%, #fadbd8 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .page {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #startPage {
            background: white;
            border-radius: 24px;
            padding: 80px 40px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .title {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 40px;
            color: #d35400;
        }
        
        .subtitle {
            font-size: 20px;
            color: #e67e22;
            margin-bottom: 50px;
        }

        .start-btn {
            background: linear-gradient(135deg, #e67e22 0%, #d35400 100%);
            color: white;
            border: none;
            padding: 18px 60px;
            font-size: 20px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            box-shadow: 0 6px 20px rgba(230, 126, 34, 0.3);
        }

        .start-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 25px rgba(230, 126, 34, 0.4);
        }

        .author {
            margin-top: 30px;
            color: #666;
            font-size: 16px;
        }

        .credit {
            margin-top: 10px;
            color: #999;
            font-size: 14px;
        }

        .progress-bar {
            background: white;
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: right;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .progress-text {
            color: #666;
            font-size: 14px;
        }

        .question-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            transition: all 0.3s ease;
        }

        .question-card:hover {
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .question-number {
            background: #f5f5f5;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 14px;
            color: #666;
        }

        .question-status {
            font-size: 13px;
            color: #999;
        }

        .question-text {
            font-size: 18px;
            color: #2c3e50;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            background: #fafafa;
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 18px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .option:hover {
            background: #fef5e7;
            border-color: #f39c12;
        }

        .option.selected {
            background: #fdebd0;
            border-color: #e67e22;
        }

        .option-label {
            font-size: 16px;
            color: #333;
            cursor: pointer;
            flex: 1;
        }

        .bottom-section {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-top: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .quote {
            color: #999;
            font-size: 14px;
            margin-bottom: 20px;
            text-align: center;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
        }

        .primary-btn, .secondary-btn {
            padding: 14px 32px;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .primary-btn {
            background: linear-gradient(135deg, #e67e22 0%, #d35400 100%);
            color: white;
        }

        .primary-btn:hover {
            background: linear-gradient(135deg, #d35400 0%, #c0392b 100%);
            transform: translateY(-2px);
        }

        .secondary-btn {
            background: #f5f5f5;
            color: #666;
        }

        .secondary-btn:hover {
            background: #e0e0e0;
        }

        .result-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .result-left, .result-right {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .result-left {
            text-align: center;
        }

        .result-left h2 {
            font-size: 20px;
            color: #666;
            margin-bottom: 20px;
        }

        .animal-name {
            font-size: 48px;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .animal-code {
            font-size: 42px;
            color: #e67e22;
            font-weight: 700;
            margin-bottom: 30px;
        }

        .animal-image {
            font-size: 120px;
            margin: 30px 0;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .animal-quote {
            color: #999;
            font-size: 14px;
            font-style: italic;
            margin-top: 20px;
        }

        .result-right h3 {
            font-size: 16px;
            color: #999;
            margin-bottom: 10px;
        }

        .result-right h1 {
            font-size: 36px;
            color: #2c3e50;
            margin-bottom: 15px;
        }

        .match-info {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .match-info span {
            background: #fdebd0;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            color: #d35400;
            font-weight: 500;
        }

        .short-desc {
            color: #666;
            line-height: 1.8;
            font-size: 15px;
        }

        .description-section {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            margin-bottom: 30px;
        }

        .description-section h3 {
            font-size: 20px;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        .full-description {
            color: #555;
            line-height: 1.9;
            font-size: 16px;
        }

        @media (max-width: 768px) {
            .title {
                font-size: 32px;
            }
            
            .result-container {
                grid-template-columns: 1fr;
            }
            
            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="app.js"></script>
</body>
</html>
